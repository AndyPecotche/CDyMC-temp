; https://docs.platformio.org/page/projectconf.html

[env:ATmega328P]
platform = atmelavr
board = ATmega328P
#framework = arduino
debug_tool = simavr

build_type = debug
extra_scripts =
 	post:scripts/copy_sources_for_proteus.py

upload_protocol = arduino

#Otros flags por si fueran necesarios indicarlos explicitamente (no deberia ser necesario con la configuracion anterior aplicada):

#build_flags = -DF_CPU=16000000UL -mmcu=atmega328p -Os
#build_unflags = -flto

; debug_build_flags = # En principio ninguno de estos flags deberian aplicarse, con build_type = debug, seria suficiente.
; 	-Og 
; 	-g3
; 	-gdwarf-2
; 	-fno-inline
; build_unflags = # Flags que aplican optimizacion y pueden no ser deseados en modo debug.
; 	-Os
; 	-flto
