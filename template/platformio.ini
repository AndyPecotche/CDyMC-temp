###----------AVR-STUB: descomentar para usar el AVR-STUB (debugger por hardware)---------------------
debug_tool = avr-stub
debug_port = /dev/ttyACM0 #Especificar el puerto serie al que esta conectado la placa arduino
; Set breakpoint mode
build_flags =
  -DAVR8_BREAKPOINT_MODE=1
  -DAVR8_SWINT_SOURCE=1 ; Usar INT1 (PD3) para el debugger y dejar libre INT0 (PD2)
; GDB stub implementation
lib_deps =
    jdolinay/avr-debugger @ ~1.4
debug_build_flags = -O0 -ggdb3
###--------------------------------------------------------------------------------------------------